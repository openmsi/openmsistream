version: 2.1

orbs:
  python: circleci/python@2.1.1

workflows:
  build_and_test:
    jobs:
      - lint
      - test-no-kafka:
          requires: [lint]
      - test-with-kafka:
          requires: [test-no-kafka]

jobs:
  lint:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Lint and format
          command: |
            pip install .[test]
            pyflakes openmsistream
            black --check .
            pylint openmsistream test

  test-no-kafka:
    docker:
      - image: cimg/python:3.11
    environment:
      USE_LOCAL_KAFKA_BROKER_IN_TESTS: "yes"
    steps:
      - checkout
      - run:
          name: Run unit tests (no Kafka)
          command: |
            pip install .[test]
            pytest -m "not kafka" -k "not encrypted"  --junitxml=test-results/results.xml
      - store_test_results:
          path: test-results

  test-with-kafka:
    machine:
      image: ubuntu-2204:current
    environment:
      USE_LOCAL_KAFKA_BROKER_IN_TESTS: "yes"
    steps:
      - checkout
      - run:
          name: Set Python 3.11
          command: pyenv global $(pyenv versions --bare | grep '^3\.11' | sort -V | tail -1)
      - run:
          name: Run integration tests (with Kafka)
          command: |
            pip install .[test]
            pytest -m kafka -k "not encrypted" --junitxml=test-results/results.xml
      - store_test_results:
          path: test-results
