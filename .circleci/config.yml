version: 2.1

orbs:
  python: circleci/python@2.1.1
  codecov: codecov/codecov@5

workflows:
  build_and_test:
    jobs:
      - build-and-code-check
      - test-no-kafka:
          requires: [build-and-code-check]
      - test-with-kafka:
          matrix:
            parameters:
              python-version: ["3.11", "3.9"]
          requires: [test-no-kafka]
      - combine-and-report:
          requires:
            - test-with-kafka

jobs:
  build-and-code-check:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Lint and format
          command: |
            pip install .[test]
            pyflakes openmsistream
            black --check .
            pylint openmsistream test

  test-no-kafka:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Run unit tests (no Kafka)
          command: |
            pip install .[test]
            export COVERAGE_FILE=.coverage.no-kafka
            pytest -m "not kafka" -k "not encrypted" \
              --cov=openmsistream
      - persist_to_workspace:
          root: .
          paths:
            - .coverage.no-kafka

  test-with-kafka:
    parameters:
      python-version:
        type: string
        default: "3.9"
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: Set Python version
          command: |
            pyenv install -s << parameters.python-version >>
            pyenv global << parameters.python-version >>
      - run:
          name: Run integration tests (with Kafka)
          command: |
            pip install .[test]
            export COVERAGE_FILE=.coverage.kafka-<< parameters.python-version >>
            pytest -m kafka --cov=openmsistream
      - persist_to_workspace:
          root: .
          paths:
            - .coverage.kafka-*

  combine-and-report:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Combine Coverage
          command: |
            pip install coverage
            # This looks for all files starting with .coverage.
            coverage combine
            coverage xml -o final-coverage.xml
            coverage report
      - codecov/upload:
          files: final-coverage.xml
      - store_artifacts:
          path: final-coverage.xml
